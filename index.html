<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something From My Heart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Floating hearts background -->
  <div id="hearts"></div>

  <!-- Main page -->
  <div class="container">
    <h1 class="page-title">Something From My Heart</h1>
    <p class="subtitle">tap an envelope to open it ♡</p>
    <div class="grid" id="grid"></div>
  </div>

  <!-- Letter overlay -->
  <div class="overlay" id="overlay">
    <div class="card">

      <button class="close-btn" id="closeBtn" aria-label="Close">✕</button>

      <div class="card-content">
        <div class="image-side">
          <img id="cardImage" src="" alt="memory photo" />
        </div>
        <div class="text-side">
          <div class="date" id="cardDate"></div>
          <h2 class="letter-title" id="cardTitle"></h2>
          <div class="text" id="cardText"></div>
        </div>
      </div>

      <!-- Navigation row at bottom of card — never overlaps text -->
      <div class="card-nav">
        <button class="nav-btn" id="prevBtn" aria-label="Previous">← prev</button>
        <button class="nav-btn" id="nextBtn" aria-label="Next">next →</button>
      </div>

    </div>
  </div>

  <!-- Music -->
  <button class="music-btn" id="musicBtn" aria-label="Toggle music">♫</button>

  <audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
